<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
    <h1>Formulario</h1>
    <form action="https://iesluisvelez.org/ver_REQUEST.php?">

        <fieldset>
            <legend>Datos del usuario</legend>
            <label for="lugarNacimiento">Lugar de nacimiento:</label>
            <select name="lugarNacimiento" id="lugarNacimiento">
                <optgroup label="Comunidades españolas">
                    <option value="andalucia">Andalucía</option>
                    <option value="cataluña">Cataluña</option>
                </optgroup>
                <optgroup label="Comunidades francesas">
                    <option value="normandia">Normandía</option>
                    <option value="alta francia">Alta Francia</option>
                </optgroup>
            </select>

            <br><br>
            <label for="estudiosUniversitarios">¿Estudios universitarios realizados?</label>
            <input type="checkbox" id="estudiosUniversitarios" name="estudiosUniversitarios"
                value="ha realizado estudios universitarios">

        </fieldset>

        <br>
        <button type="submit" value="enviado">Enviar</button>

    </form>
</body>

</html>
